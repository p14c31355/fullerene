# Duplicate versions that are currently required by third-party crates.
# The CI check fails when a package gains any version not listed here.

[allow]
bitflags = ["1.3.2", "2.11.1"]
getrandom = ["0.2.17", "0.3.4"]
roxmltree = ["0.20.0", "0.21.1"]
spin = ["0.9.8", "0.10.0", "0.12.0"]
volatile = ["0.4.6", "0.6.1"]
windows-sys = ["0.60.2", "0.61.2"]
