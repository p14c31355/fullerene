[package]
name = "bonder"
version.workspace = true
edition.workspace = true
authors.workspace = true

[dependencies]
log = { version = "0.4.29", default-features = false }
spin = { version = "0.10.0", default-features = false, features = ["spin_mutex"] }

[lib]
name = "bonder"
path = "src/lib.rs"

[[bin]]
name = "bonder"
path = "src/main.rs"