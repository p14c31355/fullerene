name: PR Agent

on:
  issue_comment:
    types: [created, edited]

permissions:
  pull-requests: write
  issues: write
  contents: read

jobs:
  pr-agent:
    runs-on: ubuntu-latest

    steps:
      - uses: qodo-ai/pr-agent@main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

          # Gemini
          config.model: "gemini/gemini-2.5-flash"

          GOOGLE_AI_STUDIO.GEMINI_API_KEY: ${{ secrets.GOOGLE_AI_STUDIO_GEMINI_API_KEY }}

          # To Fullerene
          pr_reviewer.extra_instructions: >
            Follow AGENTS.md as the primary project guideline.
            Focus on:
            - responsibility separation
            - context extraction opportunities
            - unsafe scope reduction
            - crate separation opportunities
            Ignore minor naming or formatting suggestions.