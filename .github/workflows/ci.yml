name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  quality:
    name: Format, metadata, and dependency policy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-06-01
          components: rust-src, llvm-tools-preview, rustfmt, clippy
          targets: wasm32-wasip1
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: python3 scripts/check_dependency_duplicates.py
      - run: python3 scripts/generate_support_matrix.py --check

  host:
    name: Host check, tests, and Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-06-01
          components: rust-src, llvm-tools-preview, rustfmt, clippy
          targets: wasm32-wasip1
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace --exclude bellows --exclude fullerene-kernel
      - run: cargo test --workspace --exclude bellows --exclude fullerene-kernel
      - run: cargo clippy --workspace --exclude bellows --exclude fullerene-kernel --all-targets

  uefi:
    name: UEFI build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-06-01
          components: rust-src, llvm-tools-preview
          targets: x86_64-unknown-uefi, wasm32-wasip1
      - uses: Swatinem/rust-cache@v2
      - name: Build kernel
        run: cargo build -Z build-std=core,alloc --package fullerene-kernel --target x86_64-unknown-uefi
      - name: Build bootloader
        env:
          KERNEL_BIN_PATH: ${{ github.workspace }}/target/x86_64-unknown-uefi/debug/fullerene-kernel.efi
        run: cargo check -Z build-std=core,alloc --package bellows --target x86_64-unknown-uefi

  drivers:
    name: Driver tests (${{ matrix.profile }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - profile: all
            ignored: ""
          - profile: no-wireless
            ignored: "iwlwifi\nwifi"
          - profile: no-usb-storage
            ignored: "usb\nstorage"
          - profile: minimal-console
            ignored: "audio\nframebuffer\nhda\niommu\niwlwifi\nstorage\nusb\nvirtio\nwifi"
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-06-01
          components: rust-src
      - uses: Swatinem/rust-cache@v2
      - name: Test selected driver profile
        env:
          NITROGEN_DRIVERIGNORE: ${{ matrix.ignored }}
        run: cargo test -p nitrogen --lib
