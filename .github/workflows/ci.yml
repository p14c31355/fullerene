name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Install Rust (nightly)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly
          components: rust-src, llvm-tools-preview

      - name: Add UEFI target
        run: rustup target add x86_64-unknown-uefi

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./ -> target"

      - name: Cargo check (host packages)
        run: cargo check --workspace --exclude bellows --exclude fullerene-kernel

      - name: Build/check UEFI packages
        run: |
          cargo build -Z build-std=core,alloc --package fullerene-kernel --target x86_64-unknown-uefi
          KERNEL_BIN_PATH="$GITHUB_WORKSPACE/target/x86_64-unknown-uefi/debug/fullerene-kernel.efi" \
            cargo check -Z build-std=core,alloc --package bellows --target x86_64-unknown-uefi
